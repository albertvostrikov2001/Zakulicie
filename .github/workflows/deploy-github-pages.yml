# Деплой без marketplace actions (codeload.github.com недоступен с GitHub runners).
# Pages: Settings → Pages → Source: Deploy from branch → gh-pages / (root).
name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Build and publish to gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPOSITORY: ${{ github.repository }}
          GITHUB_PAGES: "true"
          NEXT_PUBLIC_PAGES_BASE_PATH: /${{ github.event.repository.name }}
          NEXT_PUBLIC_SITE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
          NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
          NEXT_PUBLIC_SANITY_DATASET: ${{ secrets.NEXT_PUBLIC_SANITY_DATASET }}
        run: |
          set -euo pipefail
          git clone --depth=1 "https://x-access-token:${GITHUB_TOKEN}@github.com/${REPOSITORY}.git" repo
          cd repo
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          npm ci --legacy-peer-deps
          rm -rf app/api app/studio
          npm run build
          touch out/.nojekyll
          cd out
          git init
          git checkout -b gh-pages
          git add -A
          git commit -m "deploy: ${{ github.sha }}"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${REPOSITORY}.git" gh-pages
