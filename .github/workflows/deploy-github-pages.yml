# Деплой статики на GitHub Pages (basePath = /имя-репозитория).
# Pages: Settings → Pages → Source: Deploy from branch → gh-pages / (root).
# Либо Source: GitHub Actions (тогда deploy-pages ниже).
# Manual run: Actions → Deploy to GitHub Pages → Run workflow.
# Локально: npm run deploy:pages
name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci --legacy-peer-deps

      - name: Remove API and Studio (не поддерживаются в static export)
        run: rm -rf app/api app/studio

      # NEXT_PUBLIC_PAGES_BASE_PATH: задайте пустую строку только если сайт отдаётся с корня домена
      # (кастомный домен в Pages). Иначе — /repo как ниже, иначе CSS/JS по путям /repo/_next/… не найдутся.
      - name: Build static site
        run: npm run build
        env:
          GITHUB_PAGES: "true"
          NEXT_PUBLIC_PAGES_BASE_PATH: /${{ github.event.repository.name }}
          NEXT_PUBLIC_SITE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
          NEXT_PUBLIC_SANITY_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_SANITY_PROJECT_ID }}
          NEXT_PUBLIC_SANITY_DATASET: ${{ secrets.NEXT_PUBLIC_SANITY_DATASET }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

      - name: Publish gh-pages branch (fallback)
        uses: peaceiris/actions-gh-pages@v4
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          commit_message: "deploy: ${{ github.sha }}"

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
